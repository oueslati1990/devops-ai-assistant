version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.2
      - MCP_SERVER_URL=http://mcp-server:8001/mcp
    depends_on:
      - ollama
      - mcp-server
    restart: unless-stopped

  mcp-server:
    build: ./mcp-server
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  ollama-data:
